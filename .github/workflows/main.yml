name: BOAT AI LAB

on:

  workflow_dispatch:

jobs:

  run:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5

        with:

          python-version: '3.11'

      - run: pip install openai

      - env:

          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

        run: python main.py
